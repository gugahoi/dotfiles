set -g default-terminal "screen-256color"

set -s escape-time 10                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on

set -g history-limit 5000                 # boost history

# Configure the new leader key
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind r
bind-key r source-file ~/.tmux.conf

bind-key -T root C-h select-pane -L
bind-key -T root C-j select-pane -D
bind-key -T root C-k select-pane -U
bind-key -T root C-l select-pane -R

# maximize current pane
bind-key + run "cut -c3- '#{TMUX_CONF}' | sh -s _maximize_pane '#{session_name}' '#D'"

# set up vi keys for copy mode
set-window-option -g mode-keys vi

# start windows numbering at 1
set -g base-index 1

# enable mouse mode - useful for scrolling and resizing windows
set -g mouse on

bind-key -T prefix \\ select-layout main-vertical-mirrored

bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi \
    --border-label ' sesh ' \
    --prompt '⚡  ' \
    --header '  ^a all  ^t tmux  ^g configs  ^x zoxide  ^d kill  ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}' \
)\""

# Pane splits should open to the same path as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# needed to allow the TMUX to differentiate between Enter and Shift + Enter (used in ai clis).
set -s extended-keys on
set -g extended-keys-format csi-u

# Pane titles
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} ~ #{b:pane_current_path} "
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"

# Modern Status Bar Configuration
set -g status on
set -g status-interval 1
set -g status-justify left

# Colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-right-style "bg=#1e1e2e,fg=#cdd6f4"

# Window styles
set -g window-status-style "bg=#313244,fg=#cdd6f4"
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g window-status-separator ""

# Left side: session name and current path
set -g status-left " #S "
set -g status-left-length 20

# Right side: date, time, and system info
set -g status-right "#{?client_prefix,#[bg=#f38ba8]#[fg=#1e1e2e] ⌨ #[default] ,} %a %d %b %H:%M "
set -g status-right-length 50

# Window format
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "

# Passwhrough allows more advanced terminal features like remote clipboard
# sharing, but also notifications form TUI agents to bubble up to the terminal
# emulator - like Ghostty or Kitty.
set -g allow-passthrough on
set -g bell-action any
set -g monitor-bell on

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# TPM Plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'wfxr/tmux-fzf-url'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
