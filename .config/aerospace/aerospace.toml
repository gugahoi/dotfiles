config-version = 2

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0

# Mouse follows focus when focused monitor changes
# on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

persistent-workspaces = ["1", "2", "3"]

[gaps]
    inner.horizontal = 8
    inner.vertical =   8
    outer.left =       4
    outer.bottom =     4
    outer.top =        4
    outer.right =      4

[mode.main.binding]
    alt-h = 'focus --boundaries all-monitors-outer-frame left'
    alt-j = 'focus --boundaries all-monitors-outer-frame down'
    alt-k = 'focus --boundaries all-monitors-outer-frame up'
    alt-l = 'focus --boundaries all-monitors-outer-frame right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'


    alt-f = 'fullscreen'

    # alt-s = 'layout v_tiles' # 'layout stacking' in i3
    alt-w = 'layout h_accordion' # 'layout tabbed' in i3
    alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3
    alt-shift-e = 'balance-sizes'

    alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3

    alt-tab = "workspace-back-and-forth"

    # `focus parent`/`focus child` are not yet supported, and it's not clear whether they
    # should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
    # alt-a = 'focus parent'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'

    alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    alt-shift-m = 'move-node-to-workspace 1 --focus-follows-window'
    alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    alt-shift-comma = 'move-node-to-workspace 2 --focus-follows-window'
    alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    alt-shift-period = 'move-node-to-workspace 3 --focus-follows-window'

    alt-n = ['move-node-to-monitor --wrap-around next', 'focus-monitor --wrap-around next']
    alt-p = ['move-node-to-monitor --wrap-around prev', 'focus-monitor --wrap-around prev'] 

    alt-shift-c = 'reload-config'

    alt-r = 'mode resize'

[mode.resize.binding]
    h = 'resize width -50'
    shift-h = 'resize width -150'
    j = 'resize height +50'
    shift-j = 'resize height +150'
    k = 'resize height -50'
    shift-k = 'resize height -150'
    l = 'resize width +50'
    shift-l = 'resize width +150'
    enter = 'mode main'
    esc = 'mode main'

[workspace-to-monitor-force-assignment]
    1 = 1
    2 = 2
    3 = 3 

